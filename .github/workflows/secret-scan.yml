name: Secret scan

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Basic secret scan
        run: |
          ! grep -R -nE "(api[_-]?key|secret|token|password)" . --exclude-dir=.git --exclude='*.png' --exclude='*.jpg' --exclude='*.svg' || true
